AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NestMoney — Lambda Functions + API Gateway (REST + WebSocket)
  Configured for AWS free tier:
    - 128 MB memory default (free tier: 400,000 GB-seconds/month)
    - 3 second timeout default (override per-function for AI/video calls)
    - RDS db.t3.micro Postgres backend

# ============================================================
# Globals — applied to all Lambda functions
# Free-tier tuning: 128 MB, 3s. AI/video functions override Timeout.
# ============================================================
Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 128   # Free tier: 400,000 GB-seconds/month at 128MB = 3.2M invocations
    Timeout: 3        # Default: fast CRUD. AI/video functions override this.
    Environment:
      Variables:
        AWS_ACCOUNT_ID: !Ref AWS::AccountId
        DB_HOST: !Ref DbHost
        DB_PORT: !Ref DbPort
        DB_NAME: !Ref DbName
        DB_USER: !Ref DbUser
        DB_PASSWORD: !Ref DbPassword
        TRANSACTION_QUEUE_URL: !Ref TransactionQueue
        WS_API_ENDPOINT: !Sub 'https://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
    Layers:
      - !Ref SharedLayer

# ============================================================
# Parameters
# ============================================================
Parameters:
  DbHost:
    Type: String
    Description: RDS db.t3.micro endpoint (from infrastructure/rds.yaml Output DBEndpoint)
  DbPort:
    Type: String
    Default: '5432'
  DbName:
    Type: String
    Default: nestmoney
  DbUser:
    Type: String
    Default: nestmoney_app
  DbPassword:
    Type: String
    NoEcho: true
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID
  CognitoUserPoolArn:
    Type: String
    Description: Cognito User Pool ARN for API Gateway authorizer

# ============================================================
# Shared Lambda Layer — db.ts, secrets.ts
# ============================================================
Resources:

  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: nestmoney-shared
      Description: Shared DB client and Secrets Manager helpers
      ContentUri: layers/
      CompatibleRuntimes:
        - nodejs20.x

  # ============================================================
  # SQS Queue — Unit webhook events
  # ============================================================
  TransactionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: nestmoney-transactions
      VisibilityTimeout: 60
      MessageRetentionPeriod: 86400

  # ============================================================
  # REST API Gateway (Cognito JWT authorizer on all routes)
  # ============================================================
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Ref CognitoUserPoolArn

  # ============================================================
  # WebSocket API Gateway
  # ============================================================
  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: nestmoney-ws
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: '$request.body.action'

  # ============================================================
  # Auth Functions
  # ============================================================
  ConfirmOtpFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-confirm-otp
      CodeUri: auth/confirm-otp/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/otp/confirm
            Method: POST
            Auth:
              Authorizer: NONE

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-refresh-token
      CodeUri: auth/refresh-token/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/token/refresh
            Method: POST
            Auth:
              Authorizer: NONE

  # ============================================================
  # Family Functions
  # ============================================================
  GetFamilyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-get-family
      CodeUri: family/get-family/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /family
            Method: GET

  InviteMemberFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-invite-member
      CodeUri: family/invite-member/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /family/invite
            Method: POST

  UpdateVisibilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-update-visibility
      CodeUri: family/update-visibility/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /family/visibility
            Method: PATCH

  # ============================================================
  # Card Functions
  # ============================================================
  IssueCardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-issue-card
      CodeUri: cards/issue-card/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /cards
            Method: POST

  CardActionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-card-action
      CodeUri: cards/card-action/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /cards/action
            Method: POST

  ApproveTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-approve-transaction
      CodeUri: cards/approve-transaction/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /cards/approve
            Method: POST

  # ============================================================
  # Goal Functions
  # ============================================================
  CreateGoalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-create-goal
      CodeUri: goals/create-goal/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /goals
            Method: POST

  ContributeToGoalFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-contribute-goal
      CodeUri: goals/contribute-to-goal/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /goals/contribute
            Method: POST

  GetGoalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-get-goals
      CodeUri: goals/get-goals/
      Handler: index.handler
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /goals
            Method: GET

  # ============================================================
  # Webhook Receiver (no JWT auth — Unit uses HMAC signature)
  # ============================================================
  ReceiveUnitWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-receive-unit
      CodeUri: webhooks/receive-unit/
      Handler: index.handler
      Policies:
        - SQSSendMessagePolicy:
            QueueName: !GetAtt TransactionQueue.QueueName
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /webhooks/unit
            Method: POST
            Auth:
              Authorizer: NONE

  # ============================================================
  # Transaction Processor (SQS trigger)
  # ============================================================
  ProcessTransactionFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-process-transaction
      CodeUri: processors/process-transaction/
      Handler: index.handler
      Timeout: 10  # SQS processor — needs more than 3s for DB writes + WebSocket push
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt TransactionQueue.QueueName
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/*'
      Events:
        SqsTrigger:
          Type: SQS
          Properties:
            Queue: !GetAtt TransactionQueue.Arn
            BatchSize: 5  # Lower than default — each record hits RDS; stay within free-tier connections

  # ============================================================
  # AI Functions
  # ============================================================
  AiExplainFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-ai-explain
      CodeUri: ai/explain/
      Handler: index.handler
      MemorySize: 256  # Anthropic streaming benefits from more memory
      Timeout: 15      # Anthropic API p99 < 10s for short completions; 15s is safe
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ai/explain
            Method: POST

  AiHealthScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-ai-health-score
      CodeUri: ai/health-score/
      Handler: index.handler
      MemorySize: 256
      Timeout: 15
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /ai/health-score
            Method: GET

  # ============================================================
  # Video Function — async, no API Gateway trigger
  # Invoked async from process-transaction; timeout set high for HeyGen polling
  # ============================================================
  TriggerVideoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: nestmoney-trigger-video
      CodeUri: videos/trigger-video/
      Handler: index.handler
      MemorySize: 256
      Timeout: 60  # HeyGen async generation can take 30–45s

# ============================================================
# Outputs
# ============================================================
Outputs:
  RestApiUrl:
    Description: REST API Gateway endpoint URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/dev'

  WebSocketApiUrl:
    Description: WebSocket API Gateway endpoint URL
    Value: !Sub 'wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/prod'

  TransactionQueueUrl:
    Description: SQS queue URL for Unit.co webhook events
    Value: !Ref TransactionQueue
